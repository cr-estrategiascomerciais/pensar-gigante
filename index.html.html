  function isoWeek(d){
    var date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    var day=(date.getUTCDay()+6)%7;
    date.setUTCDate(date.getUTCDate()-day+3);
    var firstThu=new Date(Date.UTC(date.getUTCFullYear(),0,4));
    var fd=(firstThu.getUTCDay()+6)%7;
    firstThu.setUTCDate(firstThu.getUTCDate()-fd+3);
    var week=1+Math.round((date-firstThu)/(7*864e5));
    return {year:date.getUTCFullYear(),week:week};
  }
  function weekKeyOf(d){ var w=isoWeek(d); return w.year+'-S'+String(w.week).padStart(2,'0'); }
  function weeksInMonth(y,m){
    var days=new Date(y,m,0).getDate(),set={};
    for(var d=1;d<=days;d++){ set[weekKeyOf(new Date(y,m-1,d))]=1; }
    return Object.keys(set).length;
  }
  function fmtInt(n){ return Math.round(n).toLocaleString('pt-BR'); }
  function fmtBRL(n){ return 'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function fmtBRLbig(n){ return 'R$ '+Math.round(n).toLocaleString('pt-BR'); }
  function pct(a,b){ return b>0?(a/b*100):null; }
  function fmtPct(x){ return x==null?'â€“':Math.round(x)+'%'; }

  /* ---------- parsers ---------- */
  function parseAll(content){
    var lines=content.split('\n');
    var seen={};
    allRows=[];allSales=[];metaMap={};
    for(var i=0;i<lines.length;i++){
      var c=splitRow(lines[i]);
      if(!c||isSep(c)) continue;
      // tracker row: data dd/mm + closer in col 10
      if(c.length>=12 && /^\d{1,2}\/\d{1,2}/.test(c[0]) && (normCloser(c[10])==='RÃºbia'||normCloser(c[10])==='JÃº')){
        var closer=normCloser(c[10]);
        var month=parseInt(c[11],10);
        if(!month||month<1||month>12) continue;
        var key=closer+'|'+c[0]+'|'+month;
        if(seen[key]) continue; seen[key]=1;
        var dm=c[0].match(/(\d{1,2})\/(\d{1,2})/);
        var day=dm?parseInt(dm[1],10):1;
        var dt=new Date(YEAR,month-1,day);
        allRows.push({closer:closer,month:month,year:YEAR,date:dt,wk:weekKeyOf(dt),
          leads:toNum(c[1]),sql:toNum(c[2]),cont:toNum(c[3]),sessoes:toNum(c[4]),
          agend:toNum(c[5]),realiz:toNum(c[6]),noshow:toNum(c[7]),vendas:toNum(c[8]),valor:toNum(c[9])});
        continue;
      }
      // meta row: col0 = 1..12 ; col1 = big number
      if(c.length>=3 && /^\d{1,2}$/.test(c[0])){
        var mm=parseInt(c[0],10), fat=toNum(c[1]);
        if(mm>=1&&mm<=12&&fat>1000){ metaMap[mm]={fat:fat,vol:toNum(c[2])}; continue; }
      }
      // sales row: col1 = month name pt-BR, col4 = value>0, col5 = seller
      if(c.length>=6 && PT_MONTHS[c[1].toLowerCase()] && /\d{1,2}\/\d{1,2}/.test(c[0]) && toNum(c[4])>0 && c[5]){
        var sm=PT_MONTHS[c[1].toLowerCase()];
        var sc=normCloser(c[5]);
        var sdm=c[0].match(/(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?/);
        var sday=sdm?parseInt(sdm[1],10):1;
        var syr=(sdm&&sdm[3])?parseInt(sdm[3],10):YEAR; if(syr<100) syr+=2000;
        var sdt=new Date(syr,sm-1,sday);
        allSales.push({closer:sc,month:sm,year:syr,date:sdt,wk:weekKeyOf(sdt),
          valor:toNum(c[4]),produto:c[3]||'',funil:c[10]||''});
      }
    }
  }

  /* ---------- filtering ---------- */
  function periodMatch(o){
    if(state.period==='ano') return o.year===YEAR;
    if(state.period==='mes') return (o.year+'-'+o.month)===state.pval;
    if(state.period==='semana') return o.wk===state.pval;
    return true;
  }
  function filtered(){
    return allRows.filter(function(r){
      var cm=(state.closer==='Todas')||r.closer===state.closer;
      return cm && periodMatch(r);
    });
  }
  function filteredSales(){
    return allSales.filter(function(s){
      var cm=(state.closer==='Todas')?(s.closer==='RÃºbia'||s.closer==='JÃº'):s.closer===state.closer;
      return cm && periodMatch(s);
    });
  }

  /* ---------- period options ---------- */
  function closerRows(){
    return (state.closer==='Todas')?allRows:allRows.filter(function(r){return r.closer===state.closer;});
  }
  function optionsFor(type){
    var rows=closerRows(),set={},out=[];
    if(type==='ano'){ return [{v:String(YEAR),l:String(YEAR)}]; }
    rows.forEach(function(r){
      if(type==='mes') set[r.year+'-'+r.month]=r.month;
      else set[r.wk]=1;
    });
    var keys=Object.keys(set);
    if(type==='mes'){
      keys.sort(function(a,b){return parseInt(a.split('-')[1])-parseInt(b.split('-')[1]);});
      out=keys.map(function(k){var m=parseInt(k.split('-')[1]); return {v:k,l:MONTH_NAMES[m]+' '+k.split('-')[0]};});
    }else{
      keys.sort(function(a,b){return parseInt(a.split('-S')[1])-parseInt(b.split('-S')[1]);});
      out=keys.map(function(k){var n=parseInt(k.split('-S')[1]); return {v:k,l:'Semana '+n+' Â· '+k.split('-')[0]};});
    }
    return out;
  }
  function syncPsel(){
    var sel=document.getElementById('pval');
    var opts=optionsFor(state.period);
    sel.innerHTML=opts.map(function(o){return '<option value="'+o.v+'">'+o.l+'</option>';}).join('');
    var vals=opts.map(function(o){return o.v;});
    if(vals.indexOf(state.pval)<0) state.pval=vals.length?vals[vals.length-1]:'';
    sel.value=state.pval;
  }

  /* ---------- meta resolution ---------- */
  function resolveMeta(rows){
    var f=(state.closer==='Todas')?1:0.5;
    if(state.period==='ano'){
      var sf=0,sv=0,any=false;
      for(var m=1;m<=12;m++){ if(metaMap[m]){sf+=metaMap[m].fat;sv+=metaMap[m].vol;any=true;} }
      return any?{fat:sf*f,vol:sv*f,defined:true}:{defined:false};
    }
    if(state.period==='mes'){
      var mm=parseInt(state.pval.split('-')[1],10);
      if(metaMap[mm]) return {fat:metaMap[mm].fat*f,vol:metaMap[mm].vol*f,defined:true};
      return {defined:false};
    }
    if(state.period==='semana'){
      var mc={},best=-1,dm=null;
      rows.forEach(function(r){mc[r.month]=(mc[r.month]||0)+1;});
      for(var k in mc){ if(mc[k]>best){best=mc[k];dm=parseInt(k,10);} }
      if(dm&&metaMap[dm]){ var w=weeksInMonth(YEAR,dm); return {fat:metaMap[dm].fat/w*f,vol:metaMap[dm].vol/w*f,defined:true}; }
      return {defined:false};
    }
    return {defined:false};
  }

  /* ---------- render ---------- */
  var GREEN='#2a7d5a',RED='#b83232',PRIM='#2d6a7f';
  function card(o){
    var bclass=o.status==='good'?'g':(o.status==='bad'?'r':'n');
    var btext=o.status==='good'?'no alvo':(o.status==='bad'?'abaixo':'â€”');
    if(o.badge) btext=o.badge;
    var col=o.status==='good'?GREEN:(o.status==='bad'?RED:PRIM);
    var w=Math.max(0,Math.min(100,(o.progress||0)*100));
    var bar=o.noBar?'':'<div class="bar"><i style="width:'+w+'%;background:'+col+'"></i></div>';
    return '<div class="card"><div class="ctop"><span class="label">'+o.label+'</span>'+
      '<span class="badge '+bclass+'">'+btext+'</span></div>'+
      '<div class="val">'+o.value+'</div><div class="sub">'+(o.sub||'')+'</div>'+bar+'</div>';
  }
  function rateCard(label,a,b,thr,subUnit){
    var rate=pct(a,b);
    var status=rate==null?'neutral':(rate>=thr?'good':'bad');
    return card({label:label,value:fmtPct(rate),sub:fmtInt(a)+' de '+fmtInt(b)+' '+subUnit,
      status:status,progress:rate==null?0:rate/thr});
  }

  function render(){
    var rows=filtered();
    function S(k){var t=0;for(var i=0;i<rows.length;i++)t+=rows[i][k];return t;}
    var leads=S('leads'),sql=S('sql'),cont=S('cont'),sessoes=S('sessoes'),
        agend=S('agend'),realiz=S('realiz'),noshow=S('noshow'),vendas=S('vendas'),valor=S('valor');
    var meta=resolveMeta(rows);

    // SQL mÃ©dia/closer/dia
    var dset={},cset={};
    rows.forEach(function(r){ if(r.leads||r.sql||r.cont||r.sessoes||r.agend||r.realiz){dset[r.date.getTime()]=1;cset[r.closer]=1;} });
    var nDays=Object.keys(dset).length||1;
    var nCl=Object.keys(cset).length|| (state.closer==='Todas'?2:1);
    var sqlAvg=sql/(nDays*nCl);

    var nsRate=pct(noshow,agend);
    var cards=[];
    cards.push(card({label:'Leads',value:fmtInt(leads),sub:'total no perÃ­odo',status:'neutral',badge:'sem meta',noBar:true}));
    cards.push(card({label:'SQL',value:fmtInt(sql),sub:sqlAvg.toFixed(1)+'/closer/dia Â· meta 20',
      status:sqlAvg>=20?'good':'bad',progress:sqlAvg/20}));
    cards.push(rateCard('Contactados',cont,sql,95,'SQL'));
    cards.push(rateCard('SessÃµes Abertas',sessoes,cont,60,'contatos'));
    cards.push(rateCard('ReuniÃµes Agendadas',agend,sessoes,50,'sessÃµes'));
    cards.push(rateCard('ReuniÃµes Realizadas',realiz,agend,80,'agendadas'));
    cards.push(card({label:'No Show',value:fmtPct(nsRate),sub:fmtInt(noshow)+' de '+fmtInt(agend)+' agendadas',
      status:nsRate==null?'neutral':(nsRate<=20?'good':'bad'),
      badge:nsRate==null?'â€”':(nsRate<=20?'no alvo':'acima'),progress:nsRate==null?0:nsRate/20}));
    cards.push(card({label:'Vendas (qtd)',value:fmtInt(vendas),
      sub:meta.defined?('meta '+fmtInt(meta.vol)):'meta nÃ£o definida',
      status:meta.defined?(vendas>=meta.vol?'good':'bad'):'neutral',
      badge:meta.defined?undefined:'â€”',progress:meta.defined&&meta.vol?vendas/meta.vol:0}));
    cards.push(card({label:'Valor Vendas',value:fmtBRLbig(valor),
      sub:meta.defined?('meta '+fmtBRLbig(meta.fat)):'meta nÃ£o definida',
      status:meta.defined?(valor>=meta.fat?'good':'bad'):'neutral',
      badge:meta.defined?undefined:'â€”',progress:meta.defined&&meta.fat?valor/meta.fat:0}));
    cards.push(rateCard('Conv. sobre SQL',vendas,sql,6,'SQL'));
    cards.push(rateCard('Conv. por ReuniÃ£o',vendas,realiz,25,'realizadas'));
    document.getElementById('kpis').innerHTML=cards.join('');

    renderPerf(rows);
    renderTicket();

    // scope + stamp
    var pl='';
    if(state.period==='ano') pl='Ano '+YEAR;
    else if(state.period==='mes'){var m=parseInt(state.pval.split('-')[1]);pl=MONTH_NAMES[m]+' '+state.pval.split('-')[0];}
    else pl=(document.getElementById('pval').selectedOptions[0]||{}).text||state.pval;
    document.getElementById('scope').textContent='Closer: '+state.closer+'  Â·  PerÃ­odo: '+pl+'  Â·  '+rows.length+' dias com registro';
  }

  function statSet(rows){
    function S(k){var t=0;for(var i=0;i<rows.length;i++)t+=rows[i][k];return t;}
    return {leads:S('leads'),sql:S('sql'),cont:S('cont'),sessoes:S('sessoes'),
      agend:S('agend'),realiz:S('realiz'),noshow:S('noshow'),vendas:S('vendas'),valor:S('valor')};
  }
  function colorPct(a,b,thr,lower){
    var r=pct(a,b);
    if(r==null) return '<td>â€“</td>';
    var ok=lower?(r<=thr):(r>=thr);
    return '<td class="'+(ok?'g':'r')+'">'+Math.round(r)+'%</td>';
  }
  function renderPerf(rows){
    var list=(state.closer==='Todas')?CLOSERS:[state.closer];
    var head='<thead><tr><th>Closer</th><th>Leads</th><th>SQL</th><th>Cont.%</th><th>SessÃ£o%</th>'+
      '<th>Agend.%</th><th>Realiz.%</th><th>No Show%</th><th>Vendas</th><th>Valor</th>'+
      '<th>Conv.SQL%</th><th>Conv.Reun.%</th></tr></thead>';
    var body='';
    function rowHtml(name,s,isTotal){
      return '<tr'+(isTotal?' class="total"':'')+'><td class="nm">'+name+'</td>'+
        '<td>'+fmtInt(s.leads)+'</td><td>'+fmtInt(s.sql)+'</td>'+
        colorPct(s.cont,s.sql,95)+colorPct(s.sessoes,s.cont,60)+
        colorPct(s.agend,s.sessoes,50)+colorPct(s.realiz,s.agend,80)+
        colorPct(s.noshow,s.agend,20,true)+
        '<td>'+fmtInt(s.vendas)+'</td><td>'+fmtBRLbig(s.valor)+'</td>'+
        colorPct(s.vendas,s.sql,6)+colorPct(s.vendas,s.realiz,25)+'</tr>';
    }
    list.forEach(function(cl){
      var s=statSet(rows.filter(function(r){return r.closer===cl;}));
      body+=rowHtml(cl,s,false);
    });
    body+=rowHtml('Total / time',statSet(rows),true);
    document.getElementById('perfTable').innerHTML=head+'<tbody>'+body+'</tbody>';
  }
  function renderTicket(){
    var sales=filteredSales();
    var list=(state.closer==='Todas')?CLOSERS:[state.closer];
    var head='<thead><tr><th>Closer</th><th>NÂº Vendas</th><th>Valor Total</th><th>Ticket MÃ©dio</th></tr></thead>';
    var body='';
    function row(name,arr,isTotal){
      var q=arr.length, v=arr.reduce(function(a,s){return a+s.valor;},0);
      return '<tr'+(isTotal?' class="total"':'')+'><td class="nm">'+name+'</td>'+
        '<td>'+fmtInt(q)+'</td><td>'+fmtBRL(v)+'</td>'+
        '<td>'+(q?fmtBRL(v/q):'â€“')+'</td></tr>';
    }
    list.forEach(function(cl){ body+=row(cl,sales.filter(function(s){return s.closer===cl;}),false); });
    body+=row('Total / time',sales,true);
    document.getElementById('ticketTable').innerHTML=head+'<tbody>'+body+'</tbody>';
  }

  /* ---------- events ---------- */
  function bind(){
    document.getElementById('closerPills').addEventListener('click',function(e){
      var b=e.target.closest('.pill'); if(!b) return;
      state.closer=b.dataset.c;
      [].forEach.call(this.children,function(x){x.classList.toggle('active',x===b);});
      syncPsel(); render();
    });
    document.getElementById('periodPills').addEventListener('click',function(e){
      var b=e.target.closest('.pill'); if(!b) return;
      state.period=b.dataset.p;
      [].forEach.call(this.children,function(x){x.classList.toggle('active',x===b);});
      state.pval=''; syncPsel(); render();
    });
    document.getElementById('pval').addEventListener('change',function(){ state.pval=this.value; render(); });
  }

  /* ---------- init ---------- */
  function init(){
    var raw=document.getElementById('sheetData').textContent;
    parseAll(extractContent(raw));
    // default: most recent month available
    var months={};
    allRows.forEach(function(r){months[r.year+'-'+r.month]=r.month;});
    var mk=Object.keys(months).sort(function(a,b){return months[a]-months[b];});
    state.period='mes';
    state.pval=mk.length?mk[mk.length-1]:'';
    bind(); syncPsel(); render();
    var now=new Date();
    document.getElementById('stamp').textContent='Dados carregados '+now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
  init();
})();
</script>
